<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Striker | GitHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Menu UI -->
    <div id="ui-container">
        <div id="main-menu" class="overlay">
            <h1>STRIKER 3D</h1>
            <nav class="btn-group">
                <button id="start-btn">Start Game</button>
                <button onclick="togglePanel('settings')">Settings</button>
                <button onclick="togglePanel('profile')">Profile</button>
            </nav>

            <div id="settings" class="panel">
                <h2>Settings</h2>
                <p>Sensitivity <input type="range"></p>
                <button onclick="togglePanel()">Back</button>
            </div>

            <div id="profile" class="panel">
                <h2>Profile</h2>
                <p>Kills: <span id="kill-count">0</span></p>
                <button onclick="togglePanel()">Back</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <div id="crosshair"></div>
            <div id="stats">KILLS: <span id="score">0</span></div>
        </div>
    </div>

    <!-- Load Game Logic -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
