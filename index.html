<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D GitHub Striker v2</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px; 
                     border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #ui { position: fixed; top: 20px; left: 20px; color: #0f0; font-size: 24px; z-index: 10; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
                display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; cursor: pointer; z-index: 20; }
    </style>
</head>
<body>
    <div id="menu">
        <h1 style="font-size: 3em; margin-bottom: 10px;">READY TO SHOOT?</h1>
        <p style="font-size: 1.5em; color: #0f0;">CLICK ANYWHERE TO START</p>
        <p style="margin-top: 20px; color: #888;">WASD: Move | Mouse: Aim | Click: Fire</p>
    </div>
    <div id="crosshair"></div>
    <div id="ui">TARGETS DESTROYED: <span id="score">0</span></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'https://unpkg.com';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x000000, 0, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. LIGHTING
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0x00ff00, 1);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        // 3. THE WORLD (Floor & Gun)
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const gun = new THREE.Mesh(
            new THREE.BoxGeometry(0.15, 0.15, 0.6),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        gun.position.set(0.3, -0.2, -0.5);
        camera.add(gun);
        scene.add(camera); // Required because gun is a child of camera

        // 4. CONTROLS
        const controls = new PointerLockControls(camera, document.body);
        const menu = document.getElementById('menu');

        // FIXED LOCK LOGIC: Trigger lock IMMEDIATELY on click
        menu.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => menu.style.display = 'none');
        controls.addEventListener('unlock', () => menu.style.display = 'flex');

        // 5. TARGETS
        const targets = [];
        let score = 0;
        const raycaster = new THREE.Raycaster();

        function createTarget() {
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(2, 2, 2),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x550000 })
            );
            cube.position.set((Math.random() - 0.5) * 60, 1, (Math.random() - 0.5) * 60);
            scene.add(cube);
            targets.push(cube);
        }
        for(let i=0; i<10; i++) createTarget();

        // 6. SHOOTING
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) return;

            // Recoil
            gun.position.z += 0.05;
            setTimeout(() => gun.position.z -= 0.05, 40);

            raycaster.setFromCamera(new THREE.Vector2(), camera);
            const hits = raycaster.intersectObjects(targets);
            if (hits.length > 0) {
                const target = hits[0].object;
                scene.remove(target);
                targets.splice(targets.indexOf(target), 1);
                score++;
                document.getElementById('score').innerText = score;
                createTarget();
            }
        });

        // 7. MOVEMENT
        let moveF = false, moveB = false, moveL = false, moveR = false;
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true;
            if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true;
            if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false;
            if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false;
            if(e.code === 'KeyD') moveR = false;
        });

        // 8. ANIMATION LOOP
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const delta = clock.getDelta();
                const speed = 15;
                if (moveF) controls.moveForward(speed * delta);
                if (moveB) controls.moveForward(-speed * delta);
                if (moveL) controls.moveRight(-speed * delta);
                if (moveR) controls.moveRight(speed * delta);
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
